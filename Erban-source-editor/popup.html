<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贰伴</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 270px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    color: #e0e0e0;
    background: #1a1d23;
  }
  .header {
    padding: 14px 18px;
    background: linear-gradient(135deg, #00a86b, #009e63);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .content { padding: 16px 18px; }
  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding: 10px 14px;
    background: #22252d;
    border-radius: 8px;
    border: 1px solid #2e323a;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #555;
    transition: background 0.3s;
  }
  .status-dot.connected { background: #00a86b; box-shadow: 0 0 6px rgba(0,168,107,0.4); }
  .status-dot.disconnected { background: #ef4444; }
  .status-text { font-size: 12px; color: #9ca3af; }
  .section { margin-bottom: 14px; }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .hotkey {
    font-family: "Consolas", "Monaco", monospace;
    font-size: 11px;
    background: #2c3038;
    padding: 2px 6px;
    border-radius: 4px;
    color: #cdd6e0;
  }
  .tip { font-size: 11px; color: #9ca3af; line-height: 1.7; }
  .footer {
    padding: 10px 18px;
    border-top: 1px solid #2e323a;
    text-align: center;
    font-size: 10px;
    color: #555;
    letter-spacing: 0.03em;
  }
  button {
    width: 100%;
    padding: 9px 0;
    border: 1px solid #00a86b;
    border-radius: 6px;
    background: transparent;
    color: #00a86b;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  button:hover { background: #00a86b; color: #fff; }
  button:disabled { opacity: 0.35; cursor: not-allowed; border-color: #555; color: #555; }
  button:disabled:hover { background: transparent; }
</style>
</head>
<body>
  <div class="header">贰伴</div>
  <div class="content">
    <div class="status-row">
      <div class="status-dot disconnected" id="statusDot"></div>
      <span class="status-text" id="statusText">检查连接中...</span>
    </div>

    <div class="section">
      <button id="openEditorBtn">打开源代码编辑器</button>
    </div>

    <div class="section">
      <div class="section-title">快捷键</div>
      <div class="tip">
        使用 <span class="hotkey">Ctrl+Shift+E</span>
        <br>(Mac: <span class="hotkey">Cmd+Shift+E</span>)
        <br>快速打开/关闭编辑器
      </div>
    </div>

    <div class="section">
      <div class="section-title">使用提示</div>
      <div class="tip">
        1. 在文章编辑页面使用<br>
        2. Tab键插入缩进<br>
        3. Ctrl+F 查找源码<br>
        4. Ctrl+Enter 快速应用
      </div>
    </div>
  </div>
  <div class="footer">贰伴 v2.1.0 · 中科院物理所</div>

  <script src="popup.js"></script>
</body>
</html>
